name: Build and Deploy Edge AI Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn về máy chủ ảo
      uses: actions/checkout@v3

    - name: Cài đặt Python và PlatformIO Core
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install platformio

    - name: Tải Model mới nhất từ Edge Impulse
      run: |
        echo "Đang tải C++ library từ Edge Impulse..."
        curl -H "x-api-key: ${{ secrets.EI_API_KEY }}" \
             -o model.zip \
             "https://studio.edgeimpulse.com/v1/api/${{ secrets.EI_PROJECT_ID }}/export/download?type=zip"
        
        # Giải nén thẳng vào thư mục lib của PlatformIO để nó tự động biên dịch
        unzip -o model.zip -d lib/edge_impulse_model/

    - name: Tiến hành Biên dịch (Build)
      run: pio run 

    - name: Đẩy Firmware lên Azure Blob Storage
      uses: azure/CLI@v1
      with:
        inlineScript: |
          az storage blob upload \
            --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --container-name firmware \
            --file .pio/build/esp32-s3-devkitc-1/firmware.bin \
            --name firmware.bin \
            --overwrite true